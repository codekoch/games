<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- WICHTIG: Dieser Tag sorgt dafür, dass die Skalierung auf Handys stimmt -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codekoch games</title>
  
  <style>
    /* Grundlegendes Styling für den Darkmode */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #121212; /* Sehr dunkler, fast schwarzer Hintergrund */
      color: #e0e0e0; /* Helle Textfarbe für guten Kontrast */
    }

    /* Der Container für das Layout */
    .game-grid {
      display: grid;
      /* Magische Zeile: Elemente sind min. 200px breit. Auf Handys rutschen sie
         automatisch untereinander, auf dem iPad/PC ordnen sie sich nebeneinander an. */
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; /* Abstand zwischen den Elementen */
      max-width: 900px;
      margin: 0 auto; /* Zentriert das gesamte Grid */
    }

    /* Das Aussehen der einzelnen Links/Karten im Darkmode */
    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none; /* Unterstrich der Links entfernen */
      color: #e0e0e0; /* Helle Schrift auf dunklen Karten */
      background-color: #1e1e1e; /* Etwas hellerer Grauton für die Karten, um sie vom Body abzuheben */
      padding: 15px;
      border-radius: 12px; /* Abgerundete Ecken */
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5); /* Stärkerer Schatten für Darkmode */
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* Ein kleiner Effekt, wenn man mit der Maus drüberfährt */
    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.8); /* Noch stärkerer Schatten beim Hover */
    }

    /* Das Bild innerhalb der Karte */
    .game-card img {
      width: 100%;
      max-width: 200px; /* Bilder werden nie breiter als 200px */
      height: auto; /* Verhindert Verzerrungen */
      border-radius: 8px;
      margin-bottom: 12px;
      /* Optional: Bilder im Darkmode minimal abdunkeln, damit sie nicht so blenden */
      filter: brightness(0.9);
      transition: filter 0.2s ease;
    }
    
    /* Bilder beim Hover wieder voll aufhellen */
    .game-card:hover img {
      filter: brightness(1);
    }

    /* Der Text */
    .game-card b {
      font-size: 1.1rem;
      text-align: center;
      line-height: 1.3;
    }
  </style>
</head>
<body>
    <div class="page-header">
    <h1>codekoch games</h1>
  </div>
  <div class="game-grid">
    <!-- Spiel 1 -->
    <a href="https://codekoch.github.io/SchulHacks/escapefromalpenkoenig.html" class="game-card">
      <img src="alpenkoenig.png" alt="Escape from Alpenkönig">
      <b>Escape from Alpenkönig</b>
    </a>

    <!-- Spiel 2 -->
    <a href="https://codekoch.github.io/Kettenreaktion" class="game-card">
      <img src="kettenreaktion.png" alt="Kettenreaktion">
      <b>Kettenreaktion</b>
    </a>

    <!-- Spiel 3 -->
    <a href="https://codekoch.github.io/hackduel" class="game-card">
      <img src="hackduel.png" alt="Hack Duel">
      <b>Hack Duel</b>
    </a>
  </div>

</body>
</html>
